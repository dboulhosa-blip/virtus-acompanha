services:
  - type: web
    name: virtus-acompanha
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: HOST=0.0.0.0 python server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
